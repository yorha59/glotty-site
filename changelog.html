<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glotty — What's New</title>
<style>
  :root { color-scheme: light; }
  body { font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans", "Noto Sans CJK", sans-serif;
         max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; color: #1d1d1f; }
  h1 { font-size: 28px; margin-bottom: 4px; }
  .meta { color: #86868b; font-size: 14px; margin-bottom: 28px; }
  a { color: #2997ff; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .appicon { width: 56px; height: 56px; object-fit: contain; }
  select { font: inherit; padding: 4px 8px; border-radius: 8px; }
  .rel { display: flex; gap: 24px; padding: 22px 0; border-top: 1px solid #e3e3e6; }
  .rel:first-of-type { border-top: none; }
  .ver { flex: 0 0 96px; font-weight: 600; font-size: 18px; }
  .ver .date { display: block; font-weight: 400; font-size: 13px; color: #86868b; margin-top: 3px; }
  .body { color: #333; }
  footer { margin-top: 48px; color: #86868b; font-size: 14px; border-top: 1px solid #8884; padding-top: 16px; }
  @media (max-width: 600px) { .rel { flex-direction: column; gap: 6px; } }
</style>
</head>
<body>
<header class="topbar">
  <img src="icon.png" alt="Glotty" class="appicon">
  <select id="lang" aria-label="Language"></select>
</header>
<main id="content">
  <h1>What's New</h1>
  <p class="meta">Glotty release history</p>
  <div class="rel"><div class="ver">1.0<span class="date">2026-06-09</span></div>
    <div class="body">First public release. Translate, explain, polish, and chat on any text you
    select — on-device translation, plus Apple Intelligence or your own AI key.</div></div>
</main>

<script>
// Release timeline — newest first. Dates are shared; notes are localized
// via I18N[lang].notes[i] (same order). Each release: prepend a {v,date}
// here and one note string to every language's `notes` array.
const RELEASES = [{ v:"1.0", date:"2026-06-09" }];
const I18N = {
  "en": { name:"English", title:"What's New", subtitle:"Glotty release history", home:"Home", privacy:"Privacy Policy",
    notes:["First public release. Translate, explain, polish, and chat on any text you select — on-device translation, plus Apple Intelligence or your own AI key."] },
  "zh-Hans": { name:"简体中文", title:"更新内容", subtitle:"Glotty 版本历史", home:"主页", privacy:"隐私政策",
    notes:["首次公开发布。对任意选中的文本进行翻译、解释、润色与对话——本机翻译，并支持 Apple Intelligence 或你自己的 AI 密钥。"] },
  "zh-Hant": { name:"繁體中文", title:"更新內容", subtitle:"Glotty 版本紀錄", home:"主頁", privacy:"隱私權政策",
    notes:["首次公開發布。對任意選取的文字進行翻譯、解釋、潤飾與對話——本機翻譯，並支援 Apple Intelligence 或你自己的 AI 金鑰。"] },
  "ja": { name:"日本語", title:"新着情報", subtitle:"Glotty のリリース履歴", home:"ホーム", privacy:"プライバシーポリシー",
    notes:["初の一般公開リリース。選択したテキストを翻訳・解説・推敲・チャット——オンデバイス翻訳に加え、Apple Intelligence または自分の AI キーに対応。"] },
  "ko": { name:"한국어", title:"새로운 기능", subtitle:"Glotty 릴리스 기록", home:"홈", privacy:"개인정보 처리방침",
    notes:["첫 정식 출시. 선택한 텍스트를 번역·설명·다듬기·대화 — 온디바이스 번역과 Apple Intelligence 또는 직접 준비한 AI 키 지원."] },
  "es": { name:"Español", title:"Novedades", subtitle:"Historial de versiones de Glotty", home:"Inicio", privacy:"Política de privacidad",
    notes:["Primera versión pública. Traduce, explica, pule y chatea sobre cualquier texto seleccionado: traducción en el dispositivo, más Apple Intelligence o tu propia clave de IA."] },
  "fr": { name:"Français", title:"Nouveautés", subtitle:"Historique des versions de Glotty", home:"Accueil", privacy:"Politique de confidentialité",
    notes:["Première version publique. Traduisez, expliquez, peaufinez et discutez sur tout texte sélectionné : traduction sur l'appareil, plus Apple Intelligence ou votre propre clé IA."] },
  "de": { name:"Deutsch", title:"Neuigkeiten", subtitle:"Glotty Versionsverlauf", home:"Startseite", privacy:"Datenschutzerklärung",
    notes:["Erste öffentliche Version. Übersetze, erkläre, verfeinere und chatte zu jedem markierten Text — Übersetzung auf dem Gerät, plus Apple Intelligence oder dein eigener KI-Schlüssel."] }
};

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function render(lang){
  const t = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.title = t.title + " — Glotty";
  let html = `<h1>${esc(t.title)}</h1><p class="meta">${esc(t.subtitle)}</p>`;
  RELEASES.forEach((rel,i)=>{
    const note = (t.notes && t.notes[i]) || "";
    html += `<div class="rel"><div class="ver">${esc(rel.v)}<span class="date">${esc(rel.date)}</span></div><div class="body">${esc(note)}</div></div>`;
  });
  html += `<footer>© 2026 Glotty · <a href="index.html">${esc(t.home)}</a> · <a href="privacy.html">${esc(t.privacy)}</a></footer>`;
  document.getElementById("content").innerHTML = html;
}
function pickLang(){
  const saved = localStorage.getItem("glotty_lang");
  if (saved && I18N[saved]) return saved;
  for (const l of (navigator.languages || [navigator.language || "en"])){
    if (I18N[l]) return l;
    const base = l.toLowerCase();
    if (base.startsWith("zh")) return /tw|hk|hant|mo/.test(base) ? "zh-Hant" : "zh-Hans";
    const short = base.split("-")[0];
    if (I18N[short]) return short;
  }
  return "en";
}
const sel = document.getElementById("lang");
for (const code in I18N){ const o=document.createElement("option"); o.value=code; o.textContent=I18N[code].name; sel.appendChild(o); }
let cur = pickLang(); sel.value = cur; render(cur);
sel.addEventListener("change", () => { localStorage.setItem("glotty_lang", sel.value); render(sel.value); });
</script>
</body>
</html>
