<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glotty — Changelog</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { font: 17px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans", "Noto Sans CJK", sans-serif;
         max-width: 760px; margin: 0 auto; padding: 16px 24px 80px; color: #1d1d1f; }
  .topnav { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
  .topnav .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 18px;
                   color: #1d1d1f; text-decoration: none; }
  .topnav .brand img { width: 26px; height: 26px; }
  .topnav .navright { display: flex; align-items: center; gap: 18px; }
  .topnav .navlink { color: #1d1d1f; text-decoration: none; font-weight: 500; }
  .topnav .navlink:hover { color: #2997ff; }
  select { font: inherit; padding: 4px 8px; border-radius: 8px; }
  h1 { font-size: 34px; text-align: center; margin: 28px 0 36px; }
  .track { margin: 0 0 44px; }
  .trackhead { font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
               color: #2997ff; margin: 0 0 6px; padding-bottom: 8px; border-bottom: 2px solid #e3e3e6; }
  .trackhead.dev { color: #b8860b; }
  .rel { display: flex; gap: 24px; padding: 18px 0; border-bottom: 1px solid #f0f0f2; }
  .ver { flex: 0 0 124px; font-weight: 600; }
  .ver .date { display: block; font-weight: 400; font-size: 13px; color: #86868b; margin-top: 2px; }
  .ver .tag { display: inline-block; margin-left: 6px; font-size: 11px; font-weight: 700; color: #9a6b00;
              background: #fff3d6; padding: 1px 7px; border-radius: 6px; vertical-align: middle; }
  .body { color: #444; }
  footer { text-align: center; margin-top: 56px; color: #86868b; font-size: 15px;
           border-top: 1px solid #e3e3e6; padding-top: 24px; }
  footer a { color: #2997ff; text-decoration: none; margin: 0 8px; }
  @media (max-width: 600px) { .rel { flex-direction: column; gap: 6px; } }
</style>
</head>
<body>
<nav class="topnav">
  <a class="brand" href="index.html"><img src="icon.png" alt="">Glotty</a>
  <div class="navright">
    <a class="navlink" id="nav-home" href="index.html"></a>
    <select id="lang" aria-label="Language"></select>
  </div>
</nav>
<h1 id="h1">Changelog</h1>
<main id="content"></main>
<footer id="footer"></footer>

<script>
// Two tracks, newest first. Notes are localized via I18N[lang].officialNotes /
// .devNotes (same index order). To log a release: prepend a {v,date} to the
// right track and one note string to every language's matching notes array.
const OFFICIAL = [{ v:"1.0", date:"2026-06-09" }];
const DEV      = [{ v:"1.0.4-beta", date:"2026-06-11" },
                  { v:"1.0.3-beta", date:"2026-06-11" },
                  { v:"1.0.2-beta", date:"2026-06-11" },
                  { v:"1.0.1-beta", date:"2026-06-10" }];

const I18N = {
  "en": { name:"English", title:"Changelog", home:"Home", privacy:"Privacy Policy",
    official:"Official", dev:"Dev preview",
    officialNotes:["First public release. Translate, explain, polish, and chat on any text you select — on-device translation, plus Apple Intelligence or your own AI key."],
    devNotes:["Spell correction now falls back to AI for badly-mangled words the built-in checker can’t fix (e.g. “simotanious” → “simultaneous”). Only used when the local check finds nothing.",
      "Chat now opens on your current selection — highlight something and start chatting about it. Adds a “Chat with Glotty” menu-bar item, and the hover menu is now a compact horizontal bar.",
      "Adds a shortcut-free trigger: rest the pointer on a selection to pop up the action menu (Translate, Explain, Polish, Chat, Correct spelling). Enable it and tune the delay in Settings.",
      "Adds Fn + R — spell-correct the selected word: a single suggestion is replaced in place; several show a pick-list to choose from."] },
  "zh-Hans": { name:"简体中文", title:"更新日志", home:"主页", privacy:"隐私政策",
    official:"正式版", dev:"开发预览版",
    officialNotes:["首次公开发布。对任意选中的文本进行翻译、解释、润色与对话——本机翻译，并支持 Apple Intelligence 或你自己的 AI 密钥。"],
    devNotes:["拼写校正现在会对内置检查器无法纠正的严重拼错单词回退到 AI（例如“simotanious”→“simultaneous”）。仅在本地检查无结果时使用。",
      "对话现在会带上当前选区——选中内容即可直接就此开聊。新增菜单栏“与 Glotty 对话”项，悬停菜单改为紧凑的横向工具条。",
      "新增免快捷键触发：将指针停留在选区上即可弹出操作菜单（翻译、解释、润色、对话、校正拼写）。可在设置中开关并调整延迟。",
      "新增 Fn + R——校正所选单词的拼写：只有一个建议时就地替换，多个建议时显示候选列表供选择。"] },
  "zh-Hant": { name:"繁體中文", title:"更新紀錄", home:"主頁", privacy:"隱私權政策",
    official:"正式版", dev:"開發預覽版",
    officialNotes:["首次公開發布。對任意選取的文字進行翻譯、解釋、潤飾與對話——本機翻譯，並支援 Apple Intelligence 或你自己的 AI 金鑰。"],
    devNotes:["拼寫校正現在會對內建檢查器無法糾正的嚴重拼錯單字回退到 AI（例如「simotanious」→「simultaneous」）。僅在本機檢查無結果時使用。",
      "對話現在會帶上目前選取範圍——選取內容即可直接就此開聊。新增選單列「與 Glotty 對話」項，懸停選單改為緊湊的橫向工具列。",
      "新增免快速鍵觸發：將指標停留在選取範圍上即可彈出操作選單（翻譯、解釋、潤飾、對話、校正拼寫）。可在設定中開關並調整延遲。",
      "新增 Fn + R——校正所選單字的拼寫：只有一個建議時就地替換，多個建議時顯示候選清單供選擇。"] },
  "ja": { name:"日本語", title:"変更履歴", home:"ホーム", privacy:"プライバシーポリシー",
    official:"正式版", dev:"開発プレビュー",
    officialNotes:["初の一般公開リリース。選択したテキストを翻訳・解説・推敲・チャット——オンデバイス翻訳に加え、Apple Intelligence または自分の AI キーに対応。"],
    devNotes:["スペル修正が、内蔵チェッカーでは直せないほど崩れた単語に対して AI へフォールバックするようになりました（例：「simotanious」→「simultaneous」）。ローカルチェックが何も見つけられない場合のみ使用します。",
      "チャットが現在の選択範囲を引き継ぐように——選択してそのまま話しかけられます。メニューバーに「Glotty とチャット」を追加し、ホバーメニューはコンパクトな横並びバーになりました。",
      "ショートカット不要のトリガーを追加：選択範囲にポインタを重ねるとアクションメニュー（翻訳・解説・推敲・チャット・スペル修正）が表示されます。設定でオン/オフと遅延を調整できます。",
      "Fn + R を追加——選択した単語のスペルを修正。候補が1つなら即座に置換し、複数あれば候補リストから選べます。"] },
  "ko": { name:"한국어", title:"변경 내역", home:"홈", privacy:"개인정보 처리방침",
    official:"정식 버전", dev:"개발 미리보기",
    officialNotes:["첫 정식 출시. 선택한 텍스트를 번역·설명·다듬기·대화 — 온디바이스 번역과 Apple Intelligence 또는 직접 준비한 AI 키 지원."],
    devNotes:["맞춤법 교정이 내장 검사기로는 고칠 수 없을 만큼 심하게 틀린 단어에 대해 AI로 폴백합니다(예: ‘simotanious’ → ‘simultaneous’). 로컬 검사가 아무것도 찾지 못할 때만 사용됩니다.",
      "채팅이 현재 선택 영역을 가져옵니다 — 선택한 내용에 대해 바로 대화하세요. 메뉴 막대에 ‘Glotty와 채팅’ 항목을 추가했고, 호버 메뉴는 가로형 컴팩트 바로 바뀌었습니다.",
      "단축키 없는 트리거 추가: 선택 영역에 포인터를 올리면 작업 메뉴(번역·설명·다듬기·대화·철자 교정)가 나타납니다. 설정에서 켜고 지연 시간을 조정할 수 있습니다.",
      "Fn + R 추가 — 선택한 단어의 철자를 교정합니다. 제안이 하나면 바로 교체하고, 여러 개면 후보 목록에서 선택합니다."] },

    official:"Oficial", dev:"Versión de desarrollo",
    officialNotes:["Primera versión pública. Traduce, explica, pule y chatea sobre cualquier texto seleccionado: traducción en el dispositivo, más Apple Intelligence o tu propia clave de IA."],
    devNotes:["La corrección ortográfica ahora recurre a la IA para palabras muy mal escritas que el corrector integrado no puede arreglar (p. ej. «simotanious» → «simultaneous»). Solo se usa cuando la comprobación local no encuentra nada.",
      "El chat ahora toma tu selección actual: selecciona algo y empieza a hablar sobre ello. Añade un elemento «Chatear con Glotty» en la barra de menús, y el menú al pasar el cursor es ahora una barra horizontal compacta.",
      "Añade un disparador sin atajos: posa el puntero sobre una selección para mostrar el menú de acciones (Traducir, Explicar, Pulir, Chatear, Corregir ortografía). Actívalo y ajusta el retardo en Ajustes.",
      "Añade Fn + R: corrige la ortografía de la palabra seleccionada. Una única sugerencia se reemplaza al instante; si hay varias, muestra una lista para elegir."] },
  "fr": { name:"Français", title:"Journal des modifications", home:"Accueil", privacy:"Politique de confidentialité",
    official:"Officielle", dev:"Aperçu de développement",
    officialNotes:["Première version publique. Traduisez, expliquez, peaufinez et discutez sur tout texte sélectionné : traduction sur l'appareil, plus Apple Intelligence ou votre propre clé IA."],
    devNotes:["La correction orthographique recourt désormais à l’IA pour les mots trop déformés que le correcteur intégré ne peut pas corriger (p. ex. « simotanious » → « simultaneous »). Utilisée uniquement quand la vérification locale ne trouve rien.",
      "Le chat reprend désormais votre sélection : surlignez un texte et discutez-en directement. Ajoute un élément « Discuter avec Glotty » dans la barre des menus, et le menu au survol devient une barre horizontale compacte.",
      "Ajoute un déclencheur sans raccourci : posez le pointeur sur une sélection pour afficher le menu d'actions (Traduire, Expliquer, Peaufiner, Discuter, Corriger l'orthographe). Activation et délai réglables dans les Réglages.",
      "Ajoute Fn + R : corrige l'orthographe du mot sélectionné. Une suggestion unique est remplacée sur place ; s'il y en a plusieurs, une liste de choix s'affiche."] },
  "de": { name:"Deutsch", title:"Änderungen", home:"Startseite", privacy:"Datenschutzerklärung",
    official:"Offiziell", dev:"Entwicklungsvorschau",
    officialNotes:["Erste öffentliche Version. Übersetze, erkläre, verfeinere und chatte zu jedem markierten Text — Übersetzung auf dem Gerät, plus Apple Intelligence oder dein eigener KI-Schlüssel."],
    devNotes:["Die Rechtschreibkorrektur greift jetzt auf KI zurück für stark verstümmelte Wörter, die die eingebaute Prüfung nicht beheben kann (z. B. „simotanious“ → „simultaneous“). Nur wenn die lokale Prüfung nichts findet.",
      "Der Chat übernimmt jetzt deine aktuelle Auswahl – markiere etwas und sprich direkt darüber. Fügt einen Menüleisten-Eintrag „Mit Glotty chatten“ hinzu; das Hover-Menü ist nun eine kompakte horizontale Leiste.",
      "Fügt einen Auslöser ohne Tastenkürzel hinzu: Zeiger auf eine Auswahl halten, um das Aktionsmenü (Übersetzen, Erklären, Verfeinern, Chatten, Rechtschreibung korrigieren) zu öffnen. Ein/Aus und Verzögerung in den Einstellungen.",
      "Fügt Fn + R hinzu: korrigiert die Rechtschreibung des markierten Wortes. Ein einzelner Vorschlag wird direkt ersetzt; bei mehreren erscheint eine Auswahlliste."] }
};

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function track(rels, notes, isDev){
  return rels.map((r,i)=>{
    const note = (notes && notes[i]) || "";
    const tag = isDev ? ` <span class="tag">beta</span>` : "";
    return `<div class="rel"><div class="ver">${esc(r.v)}${tag}<span class="date">${esc(r.date)}</span></div><div class="body">${esc(note)}</div></div>`;
  }).join("");
}
function render(lang){
  const x = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.title = x.title + " — Glotty";
  document.getElementById("h1").textContent = x.title;
  document.getElementById("nav-home").textContent = x.home;
  let html = "";
  html += `<section class="track"><h2 class="trackhead">${esc(x.official)}</h2>${track(OFFICIAL, x.officialNotes, false)}</section>`;
  html += `<section class="track"><h2 class="trackhead dev">${esc(x.dev)}</h2>${track(DEV, x.devNotes, true)}</section>`;
  document.getElementById("content").innerHTML = html;
  document.getElementById("footer").innerHTML =
    `© 2026 Glotty · <a href="index.html">${esc(x.home)}</a> · <a href="privacy.html">${esc(x.privacy)}</a>`;
}
function pickLang(){
  const saved = localStorage.getItem("glotty_lang");
  if (saved && I18N[saved]) return saved;
  for (const l of (navigator.languages || [navigator.language || "en"])){
    if (I18N[l]) return l;
    const b = l.toLowerCase();
    if (b.startsWith("zh")) return /tw|hk|hant|mo/.test(b) ? "zh-Hant" : "zh-Hans";
    const s = b.split("-")[0];
    if (I18N[s]) return s;
  }
  return "en";
}
const sel = document.getElementById("lang");
for (const code in I18N){ const o=document.createElement("option"); o.value=code; o.textContent=I18N[code].name; sel.appendChild(o); }
let cur = pickLang(); sel.value = cur; render(cur);
sel.addEventListener("change", ()=>{ localStorage.setItem("glotty_lang", sel.value); render(sel.value); });
</script>
</body>
</html>
