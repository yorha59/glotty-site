function render(lang){
  const t = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.title = t.title + " — Glotty";
  let html = `<h1>${t.title}</h1><p class="meta">${t.subtitle}</p>`;
  for (const b of t.blocks){
    if (b.h) html += `<h2>${b.h}</h2>`;
    if (b.p) html += `<p>${b.p}</p>`;
    if (b.ul) html += `<ul>${b.ul.map(x=>`<li>${x}</li>`).join("")}</ul>`;
    if (b.ol) html += `<ol>${b.ol.map(x=>`<li>${x}</li>`).join("")}</ol>`;
  }
  html += `<p>${t.contact}<a href="mailto:${EMAIL}">${EMAIL}</a>.</p>`;
  html += `<footer>© 2026 Glotty · <a href="privacy.html">${t.privacy}</a></footer>`;
  document.getElementById("content").innerHTML = html;
}

function pickLang(){
  const saved = localStorage.getItem("glotty_lang");
  if (saved && I18N[saved]) return saved;
  for (const l of (navigator.languages || [navigator.language || "en"])){
    if (I18N[l]) return l;
    const base = l.toLowerCase();
    if (base.startsWith("zh")) return /tw|hk|hant|mo/.test(base) ? "zh-Hant" : "zh-Hans";
    const short = base.split("-")[0];
    if (I18N[short]) return short;
  }
  return "en";
}

const sel = document.getElementById("lang");
for (const code in I18N){
  const o = document.createElement("option");
  o.value = code; o.textContent = I18N[code].name; sel.appendChild(o);
}
let cur = pickLang();
sel.value = cur;
render(cur);
sel.addEventListener("change", () => { localStorage.setItem("glotty_lang", sel.value); render(sel.value); });
