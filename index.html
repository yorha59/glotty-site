<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glotty — Translate &amp; learn in any app</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { font: 17px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans", "Noto Sans CJK", sans-serif;
         max-width: 1000px; margin: 0 auto; padding: 16px 24px 80px; color: #1d1d1f; }
  .langbar { text-align: right; }
  select { font: inherit; padding: 4px 8px; border-radius: 8px; }
  .hero { text-align: center; padding: 24px 0 8px; }
  .hero img { width: 104px; height: 104px; object-fit: contain; }
  .hero h1 { font-size: 44px; margin: 12px 0 6px; }
  .tagline { font-size: 23px; font-weight: 600; margin: 0 auto 10px; max-width: 640px; }
  .sub { font-size: 17px; color: #555; margin: 0 auto; max-width: 600px; }
  .feat { display: flex; gap: 48px; align-items: center; margin: 72px 0; }
  .feat.reverse { flex-direction: row-reverse; }
  .feat .shot { flex: 0 0 44%; display: flex; justify-content: center; }
  .feat .shot img { width: 100%; max-width: 460px; height: auto; }
  .feat .copy { flex: 1; }
  .feat h2 { font-size: 28px; margin: 0 0 10px; }
  .feat p { color: #444; margin: 0; font-size: 17px; }
  .note { text-align: center; max-width: 680px; margin: 80px auto 0; padding: 32px 28px;
          background: #f4f5f8; border-radius: 20px; }
  .note h2 { font-size: 24px; margin: 0 0 8px; }
  .note p { color: #555; margin: 0; }
  footer { text-align: center; margin-top: 64px; color: #86868b; font-size: 15px;
           border-top: 1px solid #e3e3e6; padding-top: 24px; }
  footer a { color: #2997ff; text-decoration: none; margin: 0 8px; }
  @media (max-width: 760px) {
    .feat, .feat.reverse { flex-direction: column; gap: 20px; margin: 48px 0; text-align: center; }
    .feat .copy { text-align: center; }
    .hero h1 { font-size: 36px; } .tagline { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="langbar"><select id="lang" aria-label="Language"></select></div>
<header class="hero">
  <img src="icon.png" alt="Glotty">
  <h1>Glotty</h1>
  <p class="tagline" id="tagline"></p>
  <p class="sub" id="sub"></p>
</header>
<main id="features"></main>
<footer id="footer"></footer>

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function row(img,t,d,rev){
  return `<section class="feat${rev?' reverse':''}">
    <div class="shot"><img src="${img}" alt="" loading="lazy" onerror="this.onerror=null;this.src=this.src.replace(/\.[A-Za-z-]+\.png$/,'.en.png')"></div>
    <div class="copy"><h2>${esc(t)}</h2><p>${esc(d)}</p></div></section>`;
}
function render(lang){
  const x = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.getElementById("tagline").textContent = x.tagline;
  document.getElementById("sub").textContent = x.sub;
  let html = "";
  x.feat.forEach((f,i)=>{ html += row("shots/"+FEAT[i]+"."+lang+".png", f[0], f[1], i%2===1); });
  html += row("shots/hud."+lang+".png", x.hud[0], x.hud[1], false);
  html += `<section class="note"><h2>${esc(x.priv[0])}</h2><p>${esc(x.priv[1])}</p></section>`;
  document.getElementById("features").innerHTML = html;
  document.getElementById("footer").innerHTML =
    `<a href="support.html">${esc(x.support)}</a> · <a href="privacy.html">${esc(x.privacy)}</a>`;
}
function pickLang(){
  const saved = localStorage.getItem("glotty_lang");
  if (saved && I18N[saved]) return saved;
  for (const l of (navigator.languages || [navigator.language || "en"])){
    if (I18N[l]) return l;
    const b = l.toLowerCase();
    if (b.startsWith("zh")) return /tw|hk|hant|mo/.test(b) ? "zh-Hant" : "zh-Hans";
    const s = b.split("-")[0];
    if (I18N[s]) return s;
  }
  return "en";
}
const sel = document.getElementById("lang");
for (const code in I18N){ const o=document.createElement("option"); o.value=code; o.textContent=I18N[code].name; sel.appendChild(o); }
let cur = pickLang(); sel.value = cur; render(cur);
sel.addEventListener("change", ()=>{ localStorage.setItem("glotty_lang", sel.value); render(sel.value); });
</script>
</body>
</html>
