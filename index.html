<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glotty</title>
<style>
  :root { color-scheme: light; }
  body { font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans", "Noto Sans CJK", sans-serif;
         margin: 0; min-height: 100vh; box-sizing: border-box; padding: 48px 20px; color: #1d1d1f; text-align: center;
         display: flex; align-items: center; justify-content: center;
         background: #e9e9ec url("icon.png") center / cover no-repeat fixed; }
  .sheet { max-width: 460px; padding: 40px 32px;
           background: rgba(255,255,255,0.80); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
           border-radius: 24px; box-shadow: 0 14px 50px #0000002e; }
  h1 { font-size: 34px; margin: 0 0 8px; }
  p { color: #555; }
  nav { margin-top: 28px; }
  a { color: #2997ff; text-decoration: none; margin: 0 12px; font-size: 17px; }
</style>
</head>
<body>
<div class="sheet">
<h1>Glotty</h1>
<p id="tag">Translation &amp; language learning that lives in your menu bar.</p>
<nav>
  <a id="support" href="support.html">Support</a>
  <a id="privacy" href="privacy.html">Privacy Policy</a>
</nav>
</div>
<script>
const T = {
  "en":{tag:"Translation & language learning that lives in your menu bar.",support:"Support",privacy:"Privacy Policy"},
  "zh-Hans":{tag:"位于菜单栏的翻译与语言学习工具。",support:"支持",privacy:"隐私政策"},
  "zh-Hant":{tag:"位於選單列的翻譯與語言學習工具。",support:"支援",privacy:"隱私權政策"},
  "ja":{tag:"メニューバーに常駐する翻訳・語学学習ツール。",support:"サポート",privacy:"プライバシーポリシー"},
  "ko":{tag:"메뉴 막대에 상주하는 번역·언어 학습 도구.",support:"지원",privacy:"개인정보 처리방침"},
  "es":{tag:"Traducción y aprendizaje de idiomas en tu barra de menús.",support:"Soporte",privacy:"Política de privacidad"},
  "fr":{tag:"Traduction et apprentissage des langues dans votre barre des menus.",support:"Assistance",privacy:"Politique de confidentialité"},
  "de":{tag:"Übersetzung und Sprachenlernen in Ihrer Menüleiste.",support:"Support",privacy:"Datenschutzerklärung"}
};
function pick(){
  for (const l of (navigator.languages || [navigator.language || "en"])){
    if (T[l]) return l;
    const b = l.toLowerCase();
    if (b.startsWith("zh")) return /tw|hk|hant|mo/.test(b) ? "zh-Hant" : "zh-Hans";
    const s = b.split("-")[0];
    if (T[s]) return s;
  }
  return "en";
}
const lang = pick();
const t = T[lang] || T.en;
document.documentElement.lang = lang;
document.getElementById("tag").textContent = t.tag;
document.getElementById("support").textContent = t.support;
document.getElementById("privacy").textContent = t.privacy;
</script>
</body>
</html>
